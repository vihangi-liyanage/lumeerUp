version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumeerup-db
    environment:
      POSTGRES_USER: lumeerup
      POSTGRES_PASSWORD: lumeerup_dev_password
      POSTGRES_DB: lumeerup
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lumeerup']
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lumeerup-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lumeerup.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
